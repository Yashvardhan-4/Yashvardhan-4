      .highlight { fill: #ffbd2e; font-weight: bold; }
      .dim { fill: #6e7681; }
      .cursor { fill: #00E5FF; animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .typing { overflow: hidden; white-space: nowrap; animation: typing 2s steps(40, end); }
      @keyframes typing { from { width: 0 } to { width: 100% } }
    </style>
