      .bg { fill: rgba(10, 10, 15, 0.85); stroke: #00E5FF; stroke-width: 1; rx: 8; ry: 8; }
      .top-bar { fill: rgba(20, 20, 25, 0.95); }
      .text { font-family: 'Fira Code', monospace; fill: #c9d1d9; font-size: 15px; }
